version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kaom_trader
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: 
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
